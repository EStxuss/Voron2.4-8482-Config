[include mainsail.cfg]
[include macros.cfg]
[include mainsail.cfg]
[include KAMP_Settings.cfg]
[include goose_purge.cfg]
[include squiggly_purge.cfg]
[include timelapse.cfg]

[mcu]
canbus_uuid: ba67e67e7edf						# Insert the CANbus-UUID of your Manta from the firmware flashing steps

[mcu EBBCan]
canbus_uuid: ad11fc7293c0						# Insert the CANbus-UUID of your SB2209 RP2040 from the firmware flashing steps

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000    			
max_z_velocity: 30 			
max_z_accel: 350
square_corner_velocity: 5.0

#[temperature_sensor Toolhead_Chamber_Thermistor]
#min_temp:0
#max_temp:80
#sensor_type: MAX31865
#sensor_pin: EBBCan:gpio9
#spi_software_sclk_pin: EBBCan:gpio10
#spi_software_mosi_pin: EBBCan:gpio8
#spi_software_miso_pin: EBBCan:gpio11
